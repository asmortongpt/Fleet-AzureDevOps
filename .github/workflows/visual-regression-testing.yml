name: Visual Regression Testing

on:
  push:
    branches: [main, develop, feature/*, fix/*]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly regression tests
    - cron: '0 2 * * 0'

jobs:
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: Start dev server
        run: npm run dev &
        env:
          VITE_API_URL: http://localhost:3001

      - name: Wait for dev server
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:5173 > /dev/null 2>&1; then
              echo "Dev server is ready"
              break
            fi
            echo "Waiting for dev server... ($i/30)"
            sleep 2
          done

      - name: Run visual regression tests
        run: npx playwright test tests/visual/ --reporter=html,list
        continue-on-error: true
        env:
          VISUAL_REGRESSION: true

      - name: Upload visual test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Create screenshot baselines
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npx playwright test tests/visual/ --update-snapshots
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tests/visual/snapshots/
          git commit -m "test: update visual regression baselines [skip ci]" || true
          git push
        continue-on-error: true

      - name: Generate visual diff report
        if: failure()
        run: |
          mkdir -p test-results/visual-diffs
          if [ -d "tests/visual/diffs" ]; then
            cp -r tests/visual/diffs/* test-results/visual-diffs/ || true
          fi

      - name: Comment PR with visual changes
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Try to find visual regression report
            const reportPath = 'test-results/visual-regression-report.json';
            let reportComment = '## Visual Regression Testing\n\n';

            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf-8'));
              reportComment += `✅ Total Tests: ${report.totalTested || 0}\n`;
              reportComment += `✅ Passed: ${report.passed || 0}\n`;
              reportComment += `❌ Failed: ${report.failed || 0}\n`;
              reportComment += `📊 Visual Regressions: ${report.visualRegressions || 0}\n\n`;
            } else {
              reportComment += '🎨 Visual regression tests completed.\n\n';
            }

            reportComment += '[View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reportComment
            });
        continue-on-error: true

      - name: Check visual regression thresholds
        if: failure()
        run: |
          if [ -f "test-results/visual-regression-report.json" ]; then
            REGRESSIONS=$(jq '.visualRegressions' test-results/visual-regression-report.json)
            if [ "$REGRESSIONS" -gt 5 ]; then
              echo "⚠️  More than 5 visual regressions detected!"
              exit 1
            fi
          fi
        continue-on-error: true

      - name: Archive screenshots for comparison
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-screenshots
          path: |
            tests/visual/snapshots/
            tests/visual/diffs/
          retention-days: 60

  # Percy integration for cloud-based visual testing (optional)
  percy-tests:
    name: Percy Visual Testing (Cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Uncomment when Percy is configured
    # if: github.event_name == 'pull_request'
    if: false # Disabled until Percy token is configured

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build

      - name: Run Percy tests
        run: npx percy exec -- npx playwright test tests/visual/
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

      - name: Upload Percy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: percy-build-results
          path: .percy
          retention-days: 30

  # Accessibility checks alongside visual testing
  accessibility-visual:
    name: Visual + Accessibility Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        run: npx playwright test tests/e2e/07-accessibility/ --reporter=html
        continue-on-error: true

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: playwright-report/
          retention-days: 30

  # Visual test reporting
  visual-summary:
    name: Visual Regression Summary
    runs-on: ubuntu-latest
    needs: [visual-regression]
    if: always()

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4

      - name: Generate summary
        run: |
          echo "## Visual Regression Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "visual-regression-report/visual-regression-report.json" ]; then
            echo "### Test Results" >> $GITHUB_STEP_SUMMARY
            cat visual-regression-report/visual-regression-report.json | jq -r '"- **Total Tests**: \(.totalTested)\n- **Passed**: \(.passed)\n- **Failed**: \(.failed)\n- **Visual Regressions**: \(.visualRegressions)"' >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- [Visual Regression Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Screenshots](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true
