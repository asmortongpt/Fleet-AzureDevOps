name: Test Suite

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # Frontend Tests
  # ============================================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npm run typecheck

      - name: Run frontend unit tests
        run: npx vitest run --passWithNoTests

      - name: Generate frontend coverage
        run: npx vitest run --coverage --passWithNoTests
        continue-on-error: true

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 30
        continue-on-error: true

  # ============================================================================
  # Backend Tests
  # ============================================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        run: |
          cd api
          npm ci --legacy-peer-deps

      - name: TypeScript type check (API)
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          cd api
          npm run typecheck

      - name: ESLint check (API)
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          cd api
          npm run lint
        continue-on-error: true

      - name: Run backend unit tests
        run: |
          cd api
          npx vitest run --passWithNoTests

      - name: Run backend integration tests
        run: |
          cd api
          npx vitest run --config vitest.integration.config.ts --passWithNoTests || true
        continue-on-error: true

      - name: Generate backend coverage
        run: |
          cd api
          npx vitest run --coverage --passWithNoTests
        continue-on-error: true

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: api/coverage/
          retention-days: 30
        continue-on-error: true

  # ============================================================================
  # E2E Tests
  # ============================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [ frontend-tests, backend-tests ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npx playwright test
        continue-on-error: true

      - name: Upload E2E test report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
        if: always()

  # ============================================================================
  # Linting & Code Quality
  # ============================================================================
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: ESLint (Frontend)
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npm run lint
        continue-on-error: true

      - name: ESLint (Backend)
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          cd api
          npm run lint
        continue-on-error: true

  # ============================================================================
  # Build Verification
  # ============================================================================
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [ frontend-tests, backend-tests ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npm run build

      - name: Verify frontend build output
        run: |
          if [ -d "dist" ]; then
            echo "✅ Frontend build successful"
            du -sh dist
          else
            echo "❌ Frontend build failed - no dist directory"
            exit 1
          fi

      - name: Setup API dependencies
        run: |
          cd api
          npm ci --legacy-peer-deps

      - name: Build API
        run: |
          cd api
          npm run build || echo "⚠️  API build skipped or failed"
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/
            api/dist/
          retention-days: 7
        if: always()

  # ============================================================================
  # Test Summary
  # ============================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [ frontend-tests, backend-tests, e2e-tests, code-quality, build-verification ]
    if: always()

    steps:
      - name: Generate test summary
        run: |
          echo "## 📊 Test Suite Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.frontend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.backend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Verification | ${{ needs.build-verification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage reports available for download" >> $GITHUB_STEP_SUMMARY
          echo "- Playwright reports available for download" >> $GITHUB_STEP_SUMMARY
          echo "- Build output available for download" >> $GITHUB_STEP_SUMMARY

      - name: Check test results
        if: |
          needs.frontend-tests.result == 'failure' ||
          needs.backend-tests.result == 'failure' ||
          needs.build-verification.result == 'failure'
        run: |
          echo "❌ Some tests failed. Please review the logs."
          exit 1
