name: Security Scanning

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # npm Audit
  # ============================================================================
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (Frontend)
        run: npm audit --audit-level=moderate --production
        continue-on-error: true

      - name: Run npm audit (Backend)
        run: |
          cd api
          npm ci --legacy-peer-deps
          npm audit --audit-level=moderate --production
        continue-on-error: true

      - name: Create audit report
        run: |
          {
            echo "# npm Audit Report"
            echo ""
            echo "## Frontend"
            npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities' || echo "No vulnerabilities found"
            echo ""
            echo "## Backend"
            cd api
            npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities' || echo "No vulnerabilities found"
          } > audit-report.txt
        continue-on-error: true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.txt
          retention-days: 30
        if: always()

  # ============================================================================
  # Snyk Security Scan
  # ============================================================================
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    if: vars.SNYK_ENABLED == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate with Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
        if: secrets.SNYK_TOKEN != ''

      - name: Run Snyk test (Frontend)
        run: snyk test --severity-threshold=high --json-file-output=snyk-frontend.json
        continue-on-error: true

      - name: Run Snyk test (Backend)
        run: |
          cd api
          snyk test --severity-threshold=high --json-file-output=snyk-backend.json
        continue-on-error: true

      - name: Upload Snyk results
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: |
            snyk-frontend.json
            api/snyk-backend.json
          retention-days: 30
        if: always()

  # ============================================================================
  # Dependency Check
  # ============================================================================
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check for outdated dependencies (Frontend)
        run: |
          npm outdated --json > frontend-outdated.json || true
          echo "## Frontend Outdated Packages" >> $GITHUB_STEP_SUMMARY
          if [ -s frontend-outdated.json ]; then
            cat frontend-outdated.json | jq 'keys[]' | head -10 >> $GITHUB_STEP_SUMMARY || true
          fi
        continue-on-error: true

      - name: Check for outdated dependencies (Backend)
        run: |
          cd api
          npm outdated --json > ../backend-outdated.json || true
          echo "## Backend Outdated Packages" >> $GITHUB_STEP_SUMMARY
          if [ -s ../backend-outdated.json ]; then
            cat ../backend-outdated.json | jq 'keys[]' | head -10 >> $GITHUB_STEP_SUMMARY || true
          fi
        continue-on-error: true

      - name: Upload outdated packages report
        uses: actions/upload-artifact@v4
        with:
          name: outdated-packages
          path: |
            frontend-outdated.json
            backend-outdated.json
          retention-days: 30
        if: always()

  # ============================================================================
  # OWASP Dependency-Check
  # ============================================================================
  dependency-check-owasp:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    if: vars.OWASP_ENABLED == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          path: '.'
          format: 'JSON'
          args: >
            --enable-retired
            --exclude node_modules
        continue-on-error: true

      - name: Upload OWASP results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            dependency-check-report.json
            dependency-check-report.html
          retention-days: 30
        if: always()

  # ============================================================================
  # Container Image Scan (if applicable)
  # ============================================================================
  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    if: hashFiles('Dockerfile', 'api/Dockerfile*') != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          if [ -f "api/Dockerfile.production" ]; then
            docker build -f api/Dockerfile.production -t fleet-api:scan .
          fi
        continue-on-error: true

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'fleet-api:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        if: hashFiles('trivy-results.sarif') != ''
        continue-on-error: true

  # ============================================================================
  # Code Scanning Summary
  # ============================================================================
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [ npm-audit, snyk-scan, dependency-check, dependency-check-owasp, container-scan ]
    if: always()

    steps:
      - name: Generate security summary
        run: |
          echo "## 🔒 Security Scanning Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| npm Audit | ${{ needs.npm-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Snyk Scan | ${{ needs.snyk-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Check | ${{ needs.dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP Dependency | ${{ needs.dependency-check-owasp.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Scan | ${{ needs.container-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recommendations" >> $GITHUB_STEP_SUMMARY
          echo "- Review any high-severity vulnerabilities immediately" >> $GITHUB_STEP_SUMMARY
          echo "- Update packages with available security patches" >> $GITHUB_STEP_SUMMARY
          echo "- Consider upgrading outdated dependencies" >> $GITHUB_STEP_SUMMARY
          echo "- Check artifact downloads for detailed reports" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Fail on Critical Vulnerabilities (Optional)
  # ============================================================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [ npm-audit ]
    if: vars.SECURITY_STRICT_MODE == 'true'

    steps:
      - name: Check npm audit results
        run: |
          cd api
          npm ci --legacy-peer-deps
          if npm audit --json --production 2>/dev/null | jq -e '.metadata.vulnerabilities.critical > 0' > /dev/null; then
            echo "❌ Critical vulnerabilities found"
            exit 1
          else
            echo "✅ No critical vulnerabilities"
          fi
        continue-on-error: true
