<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Build Timestamp - Updated: 2026-01-03 00:52:00 UTC -->
    <!-- Last Commit: feat: Add 100% completion validation build artifacts -->

    <!-- Cache Control - Force browsers to check for updates -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- X-Frame-Options: Cannot be set via meta tag - configure in server/Azure headers -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- P0-4 SECURITY FIX: Content Security Policy -->
    <!-- DEVELOPMENT: Allows unsafe-inline for react-hot-toast, sonner, vaul UI libraries -->
    <!-- PRODUCTION: Configure CSP via HTTP headers in Azure Static Web Apps with nonces -->
    <meta http-equiv="Content-Security-Policy"
        content="
            default-src 'self';
            script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://maps.googleapis.com;
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
            font-src 'self' data: https://fonts.gstatic.com;
            img-src 'self' data: blob: https:;
            connect-src 'self' ws://localhost:* wss://localhost:* http://localhost:* https://localhost:* http://20.161.96.87 ws://20.161.96.87 https://api.fleet-management.com https://fleet.capitaltechalliance.com https://*.azure.com https://*.microsoft.com https://login.microsoftonline.com https://graph.microsoft.com https://maps.googleapis.com https://api.weather.gov;
            media-src 'self' blob:;
            object-src 'none';
            frame-src 'self' https://login.microsoftonline.com;
            base-uri 'self';
            form-action 'self';
            manifest-src 'self';
            worker-src 'self' blob:;
            upgrade-insecure-requests;
        " />
    <!-- NOTE: frame-ancestors 'none' must be set via HTTP header (not meta tag) -->
    <!-- TODO Production: Configure HTTP headers in Azure Static Web Apps:
         - X-Frame-Options: DENY
         - Content-Security-Policy with frame-ancestors 'none' and nonces
         - Configure in staticwebapp.config.json or Azure CDN rules
    -->

    <!-- PWA Meta Tags -->
    <meta name="description"
        content="Intelligent Performance Fleet Management - A comprehensive multi-tenant fleet management system with real-time tracking, predictive maintenance, and advanced analytics. Powered by Capital Technology Alliance." />
    <meta name="theme-color" content="#1A1446" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CTA Fleet" />
    <meta name="application-name" content="CTA Fleet" />
    <meta name="msapplication-TileColor" content="#1A1446" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CTA Fleet - Capital Technology Alliance" />
    <meta property="og:description" content="Enterprise fleet management for modern logistics" />
    <meta property="og:image" content="/logo-full.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicons - CTA Branding -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />

    <title>CTA Fleet - Intelligent Performance Fleet Management</title>

    <!-- Performance Optimization: Resource Hints -->
    <!-- DNS Prefetch for external APIs -->
    <link rel="dns-prefetch" href="https://maps.googleapis.com">
    <link rel="dns-prefetch" href="https://graph.microsoft.com">
    <link rel="dns-prefetch" href="https://login.microsoftonline.com">

    <!-- Preconnect to critical domains -->
    <link rel="preconnect" href="https://maps.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://login.microsoftonline.com" crossorigin>

    <!-- Google Maps API - Loaded dynamically by app to avoid exposing key in source -->
    <!-- API key injected at runtime from environment variable VITE_GOOGLE_MAPS_API_KEY -->
    <!-- Note: Using system fonts (see index.css) for WCAG AAA compliance -->
</head>
