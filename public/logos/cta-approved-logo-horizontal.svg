<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="160" fill="#1A1847" rx="12"/>

  <!-- CTA Letters - White -->
  <text x="100" y="110" font-family="'Inter', 'Arial Black', sans-serif" font-size="100" font-weight="900" fill="white" letter-spacing="-3">CTA</text>

  <!-- Company Name -->
  <text x="220" y="70" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="white" letter-spacing="2">CAPITAL TECHNOLOGY</text>
  <text x="220" y="100" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="white" letter-spacing="2">ALLIANCE</text>

  <!-- Gold/Orange Accent Bar -->
