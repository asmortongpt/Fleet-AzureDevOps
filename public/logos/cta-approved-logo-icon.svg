<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - Charcoal -->
  <rect width="240" height="240" fill="#242424" rx="12"/>

  <!-- CTA Letters - White -->
  <text x="120" y="100" font-family="'Inter', 'Arial Black', sans-serif" font-size="90" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-3">CTA</text>

  <!-- Gold-to-Orange Accent Bar -->
  <rect x="40" y="130" width="160" height="6" rx="3" fill="url(#goldBar)"/>
  <defs>
    <linearGradient id="goldBar" x1="40" y1="133" x2="200" y2="133" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDC016"/>
      <stop offset="0.5" stop-color="#FF8C00"/>
      <stop offset="1" stop-color="#FF4300"/>
    </linearGradient>
  </defs>
</svg>
