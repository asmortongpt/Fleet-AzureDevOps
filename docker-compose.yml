version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fleet-postgres
    environment:
      POSTGRES_DB: fleet_db
      POSTGRES_USER: fleet_user
      POSTGRES_PASSWORD: fleet_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fleet_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleet-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fleet-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleet-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fleet-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://fleet_user:fleet_password@postgres:5432/fleet_db
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fleet_db
      DB_USER: fleet_user
      DB_PASSWORD: fleet_password
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BULL_REDIS_HOST: redis
      BULL_REDIS_PORT: 6379
      SKIP_AUTH: "true"
      DEV_TENANT_ID: "2663b110-1314-44d7-8d74-7709298b55aa"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-placeholder-key-for-startup}
      AZURE_OPENAI_ENDPOINT: ${VITE_AZURE_OPENAI_ENDPOINT:-https://placeholder.openai.azure.com}
      AZURE_OPENAI_DEPLOYMENT_ID: ${VITE_AZURE_OPENAI_DEPLOYMENT_ID:-gpt-4}
      AZURE_AD_CLIENT_ID: ${AZURE_CLIENT_ID:-placeholder}
      AZURE_AD_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-placeholder}
      AZURE_AD_TENANT_ID: ${AZURE_TENANT_ID:-placeholder}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-placeholder}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-placeholder}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-placeholder}
      CORS_ORIGIN: http://localhost:8080
      NODE_ENV: development
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3003:3001"
    networks:
      - fleet-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.slim
    container_name: fleet-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - fleet-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  fleet-network:
    driver: bridge
